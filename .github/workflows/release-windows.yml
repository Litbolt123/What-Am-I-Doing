# Build the Windows installer (Inno Setup) and attach it to GitHub Releases when you push a version tag.
# Version is read only from MSBuild (Directory.Build.props). Tag v<Version> must match (stable or semver prerelease, e.g. v1.0.2-beta.1).
# Prerelease labels (-beta.1, -rc.2, …) publish as GitHub Pre-releases (not Latest).

name: Windows installer

# Run list title (otherwise GitHub shows the HEAD commit subject, e.g. "docs: …").
# run-name may only use contexts available at queue time — not step outputs — so use tag/branch + short label.
# ASCII hyphens only (YAML + runner parsing); whole expression in double quotes.
run-name: "${{ github.ref_type == 'tag' && format('WhatAmIDoing {0} - Windows installer', github.ref_name) || format('WhatAmIDoing - Windows installer (manual {0})', github.ref_name) }}"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installer:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (Test-Path -LiteralPath $iscc) {
            Write-Host "Inno Setup 6 already present: $iscc"
            exit 0
          }
          choco install innosetup -y --no-progress
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Read version from MSBuild (Directory.Build.props)
        id: version
        shell: pwsh
        run: |
          $ver = dotnet msbuild src/WhatAmIDoing/WhatAmIDoing.csproj -nologo -getProperty:Version
          if ($LASTEXITCODE -ne 0) { throw "dotnet msbuild -getProperty:Version failed: $LASTEXITCODE" }
          $ver = ($ver | Out-String).Trim()
          if ([string]::IsNullOrWhiteSpace($ver)) { throw "MSBuild returned empty Version" }
          Write-Host "MSBuild Version: $ver"
          "app_version=$ver" >> $env:GITHUB_OUTPUT

      - name: Prerelease flag (semver prerelease in Version)
        id: release_meta
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.app_version }}"
          # Core SemVer prerelease: digits (+ dotted digits), hyphen, rest (e.g. 1.0.2-beta.1, 1.1.0-rc.2).
          $isPre = [bool]($v -match '^\d+(\.\d+)*-.+$')
          Write-Host "Version '$v' -> GitHub prerelease=$isPre"
          "prerelease=$($isPre.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Verify tag matches Version (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}" -replace '^refs/tags/v',''
          $ver = "${{ steps.version.outputs.app_version }}"
          if ($tag -ne $ver) {
            throw "Git tag is 'v$tag' but MSBuild Version is '$ver'. Bump `<Version>` in Directory.Build.props at the repo root, or delete/retag so they match."
          }

      - name: Publish (self-contained single file for installer)
        run: .\scripts\publish-installer.ps1
        shell: pwsh

      - name: Compile Inno Setup
        working-directory: installer
        run: |
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.version.outputs.app_version }} .\WhatAmIDoing.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatAmIDoing-Setup-${{ steps.version.outputs.app_version }}
          path: installer/Output/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "What Am I Doing ${{ steps.version.outputs.app_version }} - Windows installer"
          files: installer/Output/*.exe
          generate_release_notes: true
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.release_meta.outputs.prerelease != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
